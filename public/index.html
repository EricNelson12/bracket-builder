<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bracket Builder — Config</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="config-wrapper">
    <h1>Bracket Builder</h1>
    <p class="subtitle">Create and manage tournaments</p>

    <a class="presenter-link" href="/" target="_blank">Open Presenter Mode &rarr;</a>

    <div class="card">
      <h2>New Tournament</h2>
      <div class="form-group">
        <label for="t-name">Tournament name</label>
        <input type="text" id="t-name" placeholder="e.g. Spring Cup 2026">
      </div>
      <button class="btn-primary" id="create-btn">Create Tournament</button>
      <p class="error-msg" id="error-msg"></p>
    </div>

    <div class="card">
      <h2>Tournaments</h2>
      <ul class="tournament-list" id="tournament-list">
        <li><p class="empty-state">No tournaments yet.</p></li>
      </ul>
    </div>
  </div>

  <script src="/js/config.js"></script>
</body>
</html>
