<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bracket Builder — Config</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="config-wrapper">
    <h1>Bracket Builder</h1>
    <p class="subtitle">Create and manage tournaments</p>

    <a class="presenter-link" href="/presenter.html" target="_blank">Open Presenter Mode →</a>

    <div class="card">
      <h2>New Tournament</h2>
      <div class="form-group">
        <label for="t-name">Tournament name</label>
        <input type="text" id="t-name" placeholder="e.g. Spring Cup 2025">
      </div>
      <div class="form-group">
        <div class="label-row">
          <label for="t-teams">Teams <span style="color:#718096">(one per line)</span></label>
          <button class="btn-icon" id="shuffle-btn" title="Randomize order">🎲</button>
        </div>
        <textarea id="t-teams" rows="8" placeholder="Team Alpha&#10;Team Beta&#10;Team Gamma&#10;Team Delta"></textarea>
        <p class="hint" id="bracket-hint"></p>
      </div>
      <button class="btn-primary" id="create-btn">Create Tournament</button>
      <p class="error-msg" id="error-msg"></p>
    </div>

    <div class="card">
      <h2>Tournaments</h2>
      <ul class="tournament-list" id="tournament-list">
        <li><p class="empty-state">No tournaments yet.</p></li>
      </ul>
    </div>
  </div>

  <!-- Edit Tournament Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <h2>Edit Tournament</h2>
      <div class="form-group">
        <label for="edit-name">Tournament name</label>
        <input type="text" id="edit-name">
      </div>
      <div class="form-group">
        <label for="edit-teams">Teams <span style="color:#718096">(one per line)</span></label>
        <textarea id="edit-teams" rows="8"></textarea>
        <p class="hint" id="edit-bracket-hint"></p>
      </div>
      <p class="error-msg" id="edit-error-msg"></p>
      <div class="modal-buttons">
        <button class="btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button class="btn-primary" id="modal-save-btn">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="/js/bracket.js"></script>
  <script src="/js/config.js"></script>
</body>
</html>
