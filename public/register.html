<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournament Registration</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="config-wrapper">
    <h1>Register Your Team</h1>
    <p class="subtitle" id="reg-subtitle">Loading tournaments&hellip;</p>

    <div class="card" id="reg-card">
      <div class="form-group" id="tournament-picker-group">
        <label for="reg-tournament">Tournament</label>
        <select id="reg-tournament"></select>
        <p class="hint" id="reg-cutoff-hint"></p>
      </div>

      <div id="reg-form-body" style="display:none">
        <div class="form-group">
          <label for="reg-team-name">Team name <span style="color:#fc8181">*</span></label>
          <input type="text" id="reg-team-name" placeholder="e.g. Thunder Hawks" maxlength="60">
        </div>
        <div class="form-group">
          <label for="reg-captain">Captain name</label>
          <input type="text" id="reg-captain" placeholder="e.g. Jane Smith" maxlength="80">
        </div>
        <div class="form-group">
          <label for="reg-picture">Team picture <span style="color:#718096">(optional, max 5 MB)</span></label>
          <input type="file" id="reg-picture" accept="image/*">
        </div>
        <button class="btn-primary" id="reg-submit">Register Team</button>
        <p class="error-msg" id="reg-error" style="display:none"></p>
      </div>
    </div>

    <div class="card" id="reg-success" style="display:none">
      <h2>&#x2705; You&rsquo;re registered!</h2>
      <p id="reg-success-msg" style="color:#718096;margin-top:8px;margin-bottom:16px"></p>
      <button class="btn-secondary" id="reg-again">Register another team</button>
    </div>
  </div>

  <script src="/js/register.js"></script>
</body>
</html>
